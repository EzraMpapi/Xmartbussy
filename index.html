<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <meta name="description" content="BusinessSphere ERP — 27-module enterprise platform for East Africa"/>
  <meta name="theme-color" content="#16A34A"/>
  <link rel="icon"     type="image/svg+xml" href="/favicon.svg"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>BusinessSphere ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    #__splash{position:fixed;inset:0;background:#F8FAFC;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'Inter',system-ui,sans-serif;transition:opacity .35s ease}
    #__splash.out{opacity:0;pointer-events:none}
    .sp-hex{width:64px;height:74px;animation:sp-bob 1.2s ease infinite}
    .sp-name{font-size:22px;font-weight:800;color:#111827;margin-top:18px}
    .sp-name span{color:#16A34A}
    .sp-sub{font-size:13px;color:#6B7280;margin-top:6px}
    .sp-bar{width:220px;height:3px;background:#E5E7EB;border-radius:2px;margin-top:24px;overflow:hidden}
    .sp-fill{height:100%;background:linear-gradient(90deg,#16A34A,#4ADE80);border-radius:2px;animation:sp-load 2s ease forwards}
    @keyframes sp-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes sp-load{from{width:0}to{width:100%}}
  </style>
</head>
<body>
  <div id="__splash">
    <svg class="sp-hex" viewBox="0 0 120 140">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4ADE80"/><stop offset="100%" stop-color="#16A34A"/></linearGradient></defs>
      <polygon points="60,6 114,33 114,107 60,134 6,107 6,33" fill="url(#g)"/>
      <text x="60" y="78" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="52" font-weight="900" font-family="system-ui">S</text>
    </svg>
    <div class="sp-name">Business<span>Sphere</span></div>
    <div class="sp-sub">Loading 27 modules…</div>
    <div class="sp-bar"><div class="sp-fill"></div></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>window.__bsHide=function(){var e=document.getElementById('__splash');if(e){e.classList.add('out');setTimeout(function(){e.remove()},400)}}</script>
</body>
</html>
